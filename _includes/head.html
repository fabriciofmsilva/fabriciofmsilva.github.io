<head>
  <meta charset="utf-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <script>
    (function () {
      var theme = localStorage.getItem('theme');
      if (theme === 'light' || theme === 'dark') {
        document.documentElement.dataset.theme = theme;
      }
    })();
  </script>
  {% capture page_description %}{% if page.description %}{{ page.description }}{% else %}{{ site.description }}{% endif %}{% endcapture %}
  <!-- Meta -->
  <title>{% if page.title %}{{ page.title | escape }} | {{ site.title | escape }}{% else %}{{ site.title | escape }}{% endif %}</title>
  <meta name="description" content="{{ page_description | strip | escape }}">
  <link rel="canonical" href="{{ page.url | replace: 'index.html', '' | absolute_url }}">
  <!-- Open Graph -->
  <meta property="og:url" content="{{ page.url | replace: 'index.html', '' | absolute_url }}">
  <meta property="og:title" content="{% if page.title %}{{ page.title | escape }}{% else %}{{ site.title | escape }}{% endif %}">
  <meta property="og:description" content="{{ page_description | strip | escape }}">
  {% if page.image %}
  <meta property="og:image" content="{{ page.image | absolute_url }}">
  {% endif %}
  <!-- Twitter -->
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:site" content="@fabriciofmsilva">
  <meta name="twitter:creator" content="@fabriciofmsilva">

  <link rel="alternate" type="application/rss+xml"
      title="{{ site.title }}"
      href="{{ '/feed.xml' | absolute_url }}">
  <link rel="icon" href="{{ '/img/favicon.png' | relative_url }}">

  <link rel="preload" href="{{ '/fonts/source-sans-3-400-latin.woff2' | relative_url }}" as="font" type="font/woff2" crossorigin>
  <link rel="stylesheet" href="{{ '/css/main.css' | relative_url }}">

  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-2890790373732091"
     crossorigin="anonymous"></script>
  <meta name="google-adsense-account" content="ca-pub-2890790373732091">
</head>
