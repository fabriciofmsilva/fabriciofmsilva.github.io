<script>
  // Loads fn on first user interaction, or after 5s idle if the user never
  // interacts. Keeps non-critical third-party scripts off the initial load.
  function loadOnIdleOrInteraction(fn) {
    function run() {
      if (run.done) return;
      run.done = true;
      fn();
    }
    ['scroll', 'keydown', 'mousemove', 'touchstart'].forEach(function (evt) {
      window.addEventListener(evt, run, { once: true, passive: true });
    });
    if (window.requestIdleCallback) {
      window.requestIdleCallback(run, { timeout: 5000 });
    } else {
      setTimeout(run, 5000);
    }
  }

  loadOnIdleOrInteraction(function () {
    var s = document.createElement('script');
    s.async = true;
    s.src = 'https://acct.acceptrics.com/f5dbfce';
    document.head.appendChild(s);
  });
</script>
